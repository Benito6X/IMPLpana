
<style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=JetBrains+Mono:wght@500;600&family=Figtree:wght@400;500;600&display=swap');
@keyframes stripe{from{background-position:200% 0}to{background-position:-200% 0}}
@keyframes ping{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.7);opacity:.3}}
@keyframes shimmer{0%,100%{background-position:0% 0}50%{background-position:100% 0}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes scanH{0%{left:-100%}100%{left:100%}}
@keyframes glow{0%,100%{box-shadow:0 0 12px rgba(245,101,0,.4)}50%{box-shadow:0 0 26px rgba(245,101,0,.75),0 0 48px rgba(245,101,0,.12)}}

*{box-sizing:border-box;-webkit-font-smoothing:antialiased;}

.wrap{
  max-width:390px; margin:0 auto;
  font-family:'Figtree',sans-serif;
  display:flex; flex-direction:column; gap:0;
  border-radius:26px; overflow:hidden;
  border:1px solid rgba(245,101,0,.15);
  box-shadow:0 24px 60px rgba(0,0,0,.7);
}

/* ─── PROMO BAR ─────────────────────────────── */
.pbar{
  position:relative; overflow:hidden;
  background:linear-gradient(90deg,#05070f 0%,#0b1020 40%,#0e1428 60%,#05070f 100%);
  border-bottom:1px solid rgba(245,101,0,.18);
}
.pbar::before{
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent 0%,#F56500 20%,#FF9A3C 50%,#1A6AFF 80%,transparent 100%);
  background-size:200% 100%;
  animation:stripe 4s linear infinite;
  box-shadow:0 0 20px rgba(245,101,0,.65);
}
.pbar-scan{
  position:absolute; top:0; bottom:0; width:40%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);
  animation:scanH 3s ease-in-out infinite;
  pointer-events:none;
}
.pbar-inner{
  position:relative; z-index:1;
  display:flex; align-items:center;
  padding:0 10px 0 0; height:50px; gap:0;
}

/* Left accent stripe */
.pbar-stripe{
  width:3px; height:100%; flex-shrink:0;
  background:linear-gradient(180deg,#F56500 0%,#FF7A1E 50%,#1A6AFF 100%);
  box-shadow:2px 0 12px rgba(245,101,0,.45);
  margin-right:12px;
  animation:glow 2.5s ease-in-out infinite;
}

/* Offer badge — the hero element */
.pbar-offer{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  flex-shrink:0; margin-right:12px;
  background:linear-gradient(160deg,rgba(245,101,0,.18),rgba(245,101,0,.08));
  border:1px solid rgba(245,101,0,.38);
  border-radius:8px;
  padding:5px 10px; min-width:54px;
  position:relative; overflow:hidden;
  animation:glow 2.5s ease-in-out infinite;
}
.pbar-offer::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(255,180,80,.06),transparent 70%);
}
.pbar-offer-val{
  font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:15px; line-height:1;
  background:linear-gradient(90deg,#F56500,#FF9A3C,#FFD080,#F56500);
  background-size:200% 100%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:stripe 2.8s linear infinite;
  filter:drop-shadow(0 0 6px rgba(245,101,0,.5));
  white-space:nowrap;
}
.pbar-offer-tag{
  font-family:'JetBrains Mono',monospace; font-size:7px; font-weight:600;
  letter-spacing:.12em; text-transform:uppercase; color:rgba(245,160,80,.75);
  margin-top:1px; white-space:nowrap;
}

/* Text area */
.pbar-texts{flex:1; min-width:0; display:flex; flex-direction:column; gap:2px;}
.pbar-title{
  font-family:'Chakra Petch',sans-serif; font-size:12px; font-weight:700;
  color:#eef3ff; letter-spacing:.02em; text-transform:uppercase;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.2;
}
.pbar-sub{
  font-family:'Figtree',sans-serif; font-size:11px; font-weight:400;
  color:rgba(140,165,215,.72); letter-spacing:.01em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.2;
  display:flex; align-items:center; gap:5px;
}
.pbar-dot{
  width:4px; height:4px; border-radius:50%; background:#F56500; flex-shrink:0;
  animation:ping 1.6s ease-in-out infinite;
  box-shadow:0 0 5px rgba(245,101,0,.7);
}

/* CTA — WhatsApp button */
.pbar-wa{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; flex-shrink:0; margin-left:10px;
  background:linear-gradient(160deg,rgba(37,211,102,.18),rgba(37,211,102,.08));
  border:1px solid rgba(37,211,102,.38);
  border-radius:10px; padding:6px 10px;
  cursor:pointer; text-decoration:none;
  transition:background .2s, border-color .2s, transform .15s;
}
.pbar-wa:hover{background:rgba(37,211,102,.28); transform:scale(1.03);}
.pbar-wa-icon{color:#25D366; display:flex;}
.pbar-wa-lbl{
  font-family:'JetBrains Mono',monospace; font-size:7.5px; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase; color:rgba(37,211,102,.8);
  line-height:1;
}

/* Close */
.pbar-close{
  background:none; border:none; cursor:pointer;
  color:rgba(107,127,163,.45); padding:4px; margin-left:6px;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  width:20px; height:20px; border-radius:50%;
  transition:color .2s, background .2s;
}
.pbar-close:hover{color:rgba(255,255,255,.7); background:rgba(255,255,255,.07);}

/* ─── NAV ───────────────────────────────────── */
.nav-m{
  height:60px; background:rgba(6,9,16,.98);
  border-bottom:1px solid rgba(245,101,0,.1);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 14px; gap:8px;
}
.nav-m-ham{
  width:36px; height:36px;
  background:rgba(245,101,0,.08); border:1px solid rgba(245,101,0,.25); border-radius:9px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  cursor:pointer;
}
.nav-m-ham span{display:block; width:16px; height:1.5px; background:#F56500; border-radius:2px;}
.nav-m-logo{display:flex; align-items:center; gap:8px;}
.nav-m-logo-img{width:42px; height:42px; background:rgba(245,101,0,.08); border:1px solid rgba(245,101,0,.2); border-radius:8px; display:flex; align-items:center; justify-content:center;}
.nav-m-brand{font-family:'Chakra Petch',sans-serif; font-size:18px; font-weight:700; color:#fff; letter-spacing:.1em;}
.nav-m-sub{font-family:'JetBrains Mono',monospace; font-size:7.5px; letter-spacing:.2em; text-transform:uppercase; color:rgba(245,101,0,.8); margin-top:2px;}
.nav-m-actions{display:flex; gap:8px; align-items:center;}
.nav-m-wa{
  width:36px; height:36px;
  background:rgba(37,211,102,.1); border:1px solid rgba(37,211,102,.25); border-radius:9px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.nav-m-call{
  display:flex; align-items:center; gap:6px;
  background:rgba(245,101,0,.1); border:1px solid rgba(245,101,0,.25); border-radius:9px;
  padding:0 12px; height:36px;
  font-family:'Chakra Petch',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase; color:#F56500;
  cursor:pointer;
}

/* ─── HERO STUB ─────────────────────────────── */
.hero-s{
  background:linear-gradient(180deg,#07091a,#080c1e);
  padding:20px 16px 16px;
}
.hero-s-kicker{
  display:inline-flex; align-items:center; gap:7px; margin-bottom:12px;
  font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.15em; text-transform:uppercase;
  color:rgba(245,101,0,.85); background:rgba(245,101,0,.08); border:1px solid rgba(245,101,0,.2);
  padding:4px 12px; border-radius:100px;
}
.hero-s-kicker-dot{width:6px; height:6px; border-radius:50%; background:#F56500; animation:ping 1.8s infinite; box-shadow:0 0 8px rgba(245,101,0,.8);}
.hero-s-title{font-family:'Chakra Petch',sans-serif; font-size:30px; font-weight:700; line-height:.9; letter-spacing:-.04em; color:rgba(230,240,255,.2); text-transform:uppercase;}
.hero-s-title em{font-style:normal; color:rgba(245,101,0,.18);}

/* ─── CYCLE CONTROLS ────────────────────────── */
.controls{
  padding:10px 14px;
  background:#07091a;
  display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid rgba(255,255,255,.04);
}
.ctrl-dots{display:flex; gap:5px; align-items:center;}
.ctrl-dot{width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.14); cursor:pointer; transition:all .25s;}
.ctrl-dot.on{background:#F56500; width:16px; border-radius:3px; box-shadow:0 0 8px rgba(245,101,0,.5);}
.ctrl-label{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:rgba(107,127,163,.55);}
</style>

<script>
var offers=[
  {val:'-10%',tag:'HOY',title:'DIAGNÓSTICO OBD',sub:'Válido solo hasta medianoche',wa:'promo%20-10%25%20OBD'},
  {val:'GRATIS',tag:'HOY',title:'DIAGNÓSTICO INCLUIDO',sub:'Con cualquier servicio mayor',wa:'promo%20diagnóstico%20gratis'},
  {val:'6M',tag:'GARANTÍA',title:'ALTERNADOR REVISADO',sub:'Garantía documentada · Agenda hoy',wa:'promo%20alternador%20garantía'},
  {val:'2×1',tag:'OFERTA',title:'DIAGNÓSTICO HOY',sub:'Trae a un familiar — ambos incluidos',wa:'promo%202x1%20diagnóstico'},
  {val:'-15%',tag:'TEMPORAL',title:'REPUESTOS REMANUF.',sub:'Oferta de temporada IMPEL',wa:'promo%20-15%25%20repuestos'},
  {val:'24/7',tag:'EMERGENCIA',title:'ASISTENCIA EN RUTA',sub:'Respuesta en menos de 30 min',wa:'promo%20emergencia%2024h'},
  {val:'HOY',tag:'EXPRESS',title:'CITA EN 30 MINUTOS',sub:'Sin filas · Sin espera',wa:'promo%20cita%20express'},
];
var cur=(new Date().getDate()+new Date().getMonth()*31)%offers.length,timer;
function render(){
  var o=offers[cur];
  document.getElementById('pb-val').textContent=o.val;
  document.getElementById('pb-tag').textContent=o.tag;
  document.getElementById('pb-title').textContent=o.title;
  document.getElementById('pb-sub').textContent=o.sub;
  document.getElementById('pb-wa').href='https://wa.me/50762838021?text=Hola%20IMPEL,%20vi%20la%20'+o.wa;
  var d=document.getElementById('dots');
  d.innerHTML=offers.map(function(_,i){return '<div class="ctrl-dot'+(i===cur?' on':'')+'" onclick="go('+i+')"></div>';}).join('');
}
function next(){cur=(cur+1)%offers.length;render();reset();}
function go(i){cur=i;render();reset();}
function reset(){clearInterval(timer);timer=setInterval(next,5000);}
render();reset();
</script>
